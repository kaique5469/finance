<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Painel</title>
<meta name="theme-color" content="#1F1D1B" />

<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  background: #FAFAF7; min-height: 100vh; color: #1F1D1B;
  font-family: 'Inter', sans-serif; padding-bottom: env(safe-area-inset-bottom);
}
.loading { padding: 40px; text-align: center; color: #8B8680; }
.app { position: relative; padding-bottom: 90px; }
.frame { max-width: 520px; margin: 0 auto; padding: calc(20px + env(safe-area-inset-top)) 16px 0; }

.topbar { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.topbar h1 { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 24px; margin: 0; letter-spacing: -0.02em; }
.topbar-month { font-size: 13px; color: #8B8680; text-transform: capitalize; }

/* tabs */
.tabs { display: flex; gap: 4px; background: #F0EEE8; border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.tab { flex: 1; background: none; border: none; border-radius: 8px; padding: 8px 0; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 13px; color: #8B8680; cursor: pointer; }
.tab.active { background: #FFFFFF; color: #1F1D1B; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

.cal-strip { display: flex; gap: 6px; overflow-x: auto; padding: 4px 2px 14px; scrollbar-width: none; }
.cal-strip::-webkit-scrollbar { display: none; }
.cal-day { flex: 0 0 auto; width: 42px; display: flex; flex-direction: column; align-items: center; gap: 4px; background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 12px; padding: 8px 0 7px; cursor: pointer; }
.cal-day.today { border-color: #C7C2B6; }
.cal-day.selected { background: #1F1D1B; border-color: #1F1D1B; }
.cal-day.selected .cal-weekday, .cal-day.selected .cal-num { color: #FAFAF7; }
.cal-weekday { font-size: 10px; color: #8B8680; text-transform: uppercase; }
.cal-num { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14px; }
.cal-dots { display: flex; gap: 2px; height: 5px; align-items: center; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }
.cal-dot.live-marker { background: #C4862F; opacity: 0.5; }

.month-card { display: flex; align-items: center; gap: 16px; background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 16px; padding: 16px; margin-bottom: 10px; }
.month-ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
.ring { width: 64px; height: 64px; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: #F0EEE8; stroke-width: 6; }
.ring-fg { fill: none; stroke: #2F7A6B; stroke-width: 6; stroke-linecap: round; transition: stroke-dasharray 0.4s ease; }
.ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 13px; }
.month-numbers { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; color: #55524C; flex: 1; }
.month-numbers div { display: flex; align-items: center; gap: 6px; }
.month-numbers b { color: #1F1D1B; font-family: 'Manrope', sans-serif; }
.dot-legend { width: 7px; height: 7px; border-radius: 50%; }
.month-target { color: #8B8680; margin-top: 2px; }

.invest-card { display: flex; align-items: center; gap: 12px; background: #3A6EA50D; border: 1px solid #3A6EA52A; border-radius: 16px; padding: 13px 16px; margin-bottom: 16px; }
.invest-icon { width: 32px; height: 32px; border-radius: 50%; background: #3A6EA518; color: #3A6EA5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.invest-text { display: flex; flex-direction: column; }
.invest-label { font-size: 11.5px; color: #55524C; }
.invest-amount { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 17px; color: #3A6EA5; }

.day-head { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 15px; text-transform: capitalize; margin-bottom: 10px; }
.quick-add-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
.quick-add-row::-webkit-scrollbar { display: none; }
.quick-add-btn { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 20px; padding: 6px 12px 6px 6px; font-size: 12.5px; color: #55524C; cursor: pointer; }
.quick-add-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

.entry-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.entry-row { display: flex; align-items: center; gap: 10px; background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 12px; padding: 10px 12px; }
.entry-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.entry-main { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.entry-cat { font-size: 13.5px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.entry-note { font-size: 11.5px; color: #8B8680; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-amount { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 13.5px; }
.entry-x { background: none; border: none; color: #C7C2B6; cursor: pointer; padding: 2px; flex-shrink: 0; }
.empty-day { font-size: 12.5px; color: #A6A199; padding: 18px 4px; text-align: center; }
.recurring-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9.5px; color: #8B8680; background: #F0EEE8; border-radius: 8px; padding: 1px 6px; font-weight: 400; }

/* ---- REPORT ---- */
.report-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.report-nav-btn { background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #55524C; }
.report-nav-btn:disabled { opacity: 0.3; cursor: default; }
.report-nav-title { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 15px; text-transform: capitalize; }

.hero-card { background: #1F1D1B; border-radius: 18px; padding: 20px; color: #FAFAF7; margin-bottom: 12px; }
.hero-label { font-size: 11px; color: #A6A199; text-transform: uppercase; letter-spacing: 0.06em; }
.hero-value { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 32px; letter-spacing: -0.02em; margin: 2px 0 12px; }
.hero-value.neg { color: #F09A85; }
.hero-split { display: flex; gap: 20px; padding-top: 12px; border-top: 1px solid #3A3733; }
.hero-split div { display: flex; flex-direction: column; gap: 2px; }
.hero-split span:first-child { font-size: 10.5px; color: #A6A199; }
.hero-split span:last-child { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 15px; }

.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.kpi { background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 14px; padding: 13px 14px; }
.kpi-label { font-size: 10.5px; color: #8B8680; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; display: block; }
.kpi-value { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 19px; letter-spacing: -0.01em; }
.kpi-sub { font-size: 11px; color: #8B8680; margin-top: 2px; display: block; }
.kpi-sub.up { color: #2F7A6B; }
.kpi-sub.down { color: #D9573F; }

.report-section { margin-bottom: 22px; }
.report-section-title { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.report-section-title span:last-child { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 11.5px; color: #8B8680; }

.bar-row { margin-bottom: 10px; }
.bar-head { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px; }
.bar-head b { font-family: 'Manrope', sans-serif; font-weight: 700; }
.bar-head .bar-pct { color: #8B8680; font-size: 11px; margin-left: 6px; font-weight: 400; }
.bar-track { height: 7px; background: #F0EEE8; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

.activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.activity-card { background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 14px; padding: 13px 14px; display: flex; align-items: center; gap: 10px; }
.activity-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.activity-text { display: flex; flex-direction: column; }
.activity-num { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 17px; }
.activity-label { font-size: 10.5px; color: #8B8680; }

.insight { background: #FFFFFF; border: 1px solid #ECEAE4; border-left: 3px solid #C4862F; border-radius: 10px; padding: 11px 13px; font-size: 12.5px; color: #55524C; line-height: 1.45; margin-bottom: 8px; }

.report-empty { text-align: center; color: #A6A199; font-size: 12.5px; padding: 30px 10px; }

.settings { margin-bottom: 30px; }
.settings-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; background: none; border: none; border-top: 1px solid #ECEAE4; padding: 14px 2px; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 13px; color: #55524C; cursor: pointer; }
.settings-body { display: flex; flex-direction: column; gap: 16px; padding: 4px 2px 8px; }
.settings-block label { display: block; font-size: 11px; color: #8B8680; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.settings-block input[type="number"] { background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 8px; padding: 8px 10px; font-size: 14px; width: 100%; }
.settings-time-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.settings-time-label { width: 45px; text-transform: capitalize; color: #55524C; }
.settings-time-row input[type="time"] { background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 6px; padding: 4px 6px; font-size: 12px; }
.recurring-row { display: flex; align-items: center; gap: 8px; background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: 12.5px; }
.recurring-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.recurring-info { flex: 1; color: #55524C; }
.weekday-row { display: flex; gap: 6px; }
.weekday-btn { flex: 1; background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 8px; color: #8B8680; font-size: 11px; padding: 8px 0; cursor: pointer; }
.weekday-btn.active { background: #C4862F14; border-color: #C4862F; color: #C4862F; }
.project-pill { width: 100%; display: flex; align-items: center; justify-content: space-between; background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 8px; padding: 9px 11px; font-size: 13px; margin-bottom: 6px; cursor: pointer; }
.status-tag { font-size: 10.5px; padding: 2px 8px; border-radius: 20px; }
.status-Rodando { background: #2F7A6B14; color: #2F7A6B; }
.status-Em-build { background: #C4862F14; color: #C4862F; }
.status-Pausado { background: #F0EEE8; color: #8B8680; }
.export-link { display: flex; align-items: center; gap: 6px; justify-content: center; background: none; border: 1px dashed #C7C2B6; border-radius: 8px; padding: 9px; font-size: 12.5px; color: #55524C; cursor: pointer; width: 100%; }
.export-link.solid { background: #FFFFFF; border: 1px solid #ECEAE4; border-style: solid; }

.fab { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); right: 50%; transform: translateX(260px); width: 52px; height: 52px; border-radius: 50%; background: #1F1D1B; color: #FAFAF7; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px rgba(0,0,0,0.18); cursor: pointer; z-index: 20; }
@media (max-width: 560px) { .fab { right: 20px; transform: none; } }

.sheet-backdrop { position: fixed; inset: 0; background: rgba(31,29,27,0.35); display: flex; align-items: flex-end; z-index: 30; }
.sheet { background: #FAFAF7; width: 100%; max-width: 520px; margin: 0 auto; border-radius: 20px 20px 0 0; padding: 10px 18px calc(26px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 10px; }
.sheet-handle { width: 36px; height: 4px; background: #E2DFD7; border-radius: 4px; margin: 4px auto 6px; }
.type-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.type-chip { display: flex; align-items: center; gap: 5px; background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 20px; padding: 7px 12px; font-size: 12.5px; color: #8B8680; cursor: pointer; }
.sheet-input { background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 10px; padding: 12px 14px; font-size: 14px; width: 100%; font-family: 'Inter', sans-serif; }
.sheet-input.big { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 24px; text-align: center; }
.freq-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.freq-label { display: flex; align-items: center; gap: 4px; font-size: 11.5px; color: #8B8680; margin-right: 2px; }
.freq-chip { background: #FFFFFF; border: 1px solid #ECEAE4; border-radius: 20px; padding: 5px 11px; font-size: 11.5px; color: #8B8680; cursor: pointer; }
.freq-chip.active { background: #1F1D1B; border-color: #1F1D1B; color: #FAFAF7; }
.sheet-submit { display: flex; align-items: center; justify-content: center; gap: 6px; background: #1F1D1B; color: #FAFAF7; border: none; border-radius: 10px; padding: 13px; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 4px; }
</style>

<body>
<div id="root"><div class="loading">carregando…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const STORAGE_KEY = "painel-state-v4";
const WEEKDAYS = ["D", "S", "T", "Q", "Q", "S", "S"];
const MONTHS = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const MONTHS_SHORT = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const FREQ_LABEL = { daily: "Diária", weekly: "Semanal", monthly: "Mensal" };

function toDateKey(d) { return d.toISOString().slice(0, 10); }
function money(n) { return "$" + Math.round(n).toLocaleString("en-US"); }

const DEFAULT_STATE = {
  monthlyTarget: 1600,
  entries: [],
  recurring: [],
  blocks: { campo: { start: "07:00", end: "17:00" }, dev: { start: "18:00", end: "20:00" }, live: { start: "20:00", end: "23:00" } },
  liveDays: [1, 3, 5],
  projects: [
    { id: "tcg", name: "TCG Arena", status: "Em build" },
    { id: "cento", name: "Cento", status: "Rodando" },
    { id: "taskly", name: "Taskly", status: "Rodando" },
  ],
};

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return { ...DEFAULT_STATE, ...JSON.parse(raw) }; } catch (e) {}
  return DEFAULT_STATE;
}
function useStorage() {
  const [state, setState] = useState(loadState);
  const save = useCallback((next) => {
    setState(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch (e) {}
  }, []);
  return [state, save];
}

function Icon({ name, size = 14, color = "currentColor" }) {
  const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "plus": return <svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    case "x": return <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case "chevronDown": return <svg {...p}><polyline points="6 9 12 15 18 9"/></svg>;
    case "chevronUp": return <svg {...p}><polyline points="18 15 12 9 6 15"/></svg>;
    case "chevronLeft": return <svg {...p}><polyline points="15 18 9 12 15 6"/></svg>;
    case "chevronRight": return <svg {...p}><polyline points="9 18 15 12 9 6"/></svg>;
    case "check": return <svg {...p}><polyline points="20 6 9 17 4 12"/></svg>;
    case "arrowUpRight": return <svg {...p}><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>;
    case "arrowDownRight": return <svg {...p}><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></svg>;
    case "download": return <svg {...p}><path d="M12 3v12"/><polyline points="7 10 12 15 17 10"/><line x1="5" y1="21" x2="19" y2="21"/></svg>;
    case "repeat": return <svg {...p}><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>;
    case "trendingUp": return <svg {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
    case "radio": return <svg {...p}><circle cx="12" cy="12" r="2"/><path d="M4.93 19.07a10 10 0 0 1 0-14.14"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;
    case "folder": return <svg {...p}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>;
    default: return null;
  }
}

const TYPE_META = {
  in: { label: "Entrada", color: "#2F7A6B", icon: "arrowUpRight" },
  out: { label: "Saída", color: "#D9573F", icon: "arrowDownRight" },
  invest: { label: "Investido", color: "#3A6EA5", icon: "trendingUp" },
  project: { label: "Projeto", color: "#8A6BC4", icon: "folder" },
  live: { label: "Live", color: "#C4862F", icon: "radio" },
};
const FINANCIAL_TYPES = ["in", "out", "invest"];

function matchesFrequency(rule, dateObj) {
  const start = new Date(rule.startDate + "T00:00:00");
  if (dateObj < start) return false;
  if (rule.frequency === "daily") return true;
  if (rule.frequency === "weekly") return dateObj.getDay() === start.getDay();
  if (rule.frequency === "monthly") return dateObj.getDate() === start.getDate();
  return false;
}
function getEntriesForDate(state, dateKey) {
  const manual = state.entries.filter((e) => e.date === dateKey);
  const dateObj = new Date(dateKey + "T00:00:00");
  const rec = state.recurring.filter((r) => matchesFrequency(r, dateObj)).map((r) => ({
    id: `rec-${r.id}-${dateKey}`, type: r.type, amount: r.amount, category: r.category,
    note: r.note, isRecurring: true, ruleId: r.id, frequency: r.frequency, date: dateKey,
  }));
  return [...manual, ...rec];
}
function getMonthEntries(state, monthKey) {
  const [y, m] = monthKey.split("-").map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  let list = [];
  for (let day = 1; day <= daysInMonth; day++) list = list.concat(getEntriesForDate(state, toDateKey(new Date(y, m - 1, day))));
  return list;
}
function getInvestedTotal(state, uptoDateKey) {
  let total = state.entries.filter((e) => e.type === "invest" && e.date <= uptoDateKey).reduce((s, e) => s + e.amount, 0);
  state.recurring.filter((r) => r.type === "invest").forEach((r) => {
    let d = new Date(r.startDate + "T00:00:00");
    const end = new Date(uptoDateKey + "T00:00:00");
    let g = 0;
    while (d <= end && g < 3000) { if (matchesFrequency(r, d)) total += r.amount; d.setDate(d.getDate() + 1); g++; }
  });
  return total;
}
function shiftMonth(monthKey, delta) {
  const [y, m] = monthKey.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}

/* ================= REPORT ================= */
function summarize(state, monthKey) {
  const entries = getMonthEntries(state, monthKey);
  const inn = entries.filter((e) => e.type === "in");
  const out = entries.filter((e) => e.type === "out");
  const inv = entries.filter((e) => e.type === "invest");
  const totalIn = inn.reduce((s, e) => s + e.amount, 0);
  const totalOut = out.reduce((s, e) => s + e.amount, 0);
  const totalInv = inv.reduce((s, e) => s + e.amount, 0);
  const net = totalIn - totalOut - totalInv;
  const savingsRate = totalIn > 0 ? ((totalIn - totalOut) / totalIn) * 100 : 0;
  const byCat = (list) => {
    const map = {};
    list.forEach((e) => { const k = e.category || "Sem categoria"; map[k] = (map[k] || 0) + e.amount; });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  };
  return {
    entries, totalIn, totalOut, totalInv, net, savingsRate,
    incomeByCat: byCat(inn), expenseByCat: byCat(out),
    lives: entries.filter((e) => e.type === "live").length,
    projectLogs: entries.filter((e) => e.type === "project").length,
    txCount: entries.length,
  };
}

function BarList({ data, total, color }) {
  if (data.length === 0) return <div className="report-empty" style={{ padding: "14px 0" }}>Nada lançado.</div>;
  return (
    <div>
      {data.map(([cat, amount]) => {
        const pct = total > 0 ? (amount / total) * 100 : 0;
        return (
          <div className="bar-row" key={cat}>
            <div className="bar-head">
              <span>{cat}<span className="bar-pct">{Math.round(pct)}%</span></span>
              <b>{money(amount)}</b>
            </div>
            <div className="bar-track">
              <div className="bar-fill" style={{ width: `${pct}%`, background: color }} />
            </div>
          </div>
        );
      })}
    </div>
  );
}

function reportToCSV(monthKey, s, target) {
  let csv = `Resumo mensal,${monthKey}\n\n`;
  csv += `Meta,${target}\nEntradas,${s.totalIn}\nSaidas,${s.totalOut}\nInvestido,${s.totalInv}\nSaldo liquido,${s.net}\nTaxa de poupanca,${s.savingsRate.toFixed(1)}%\nLives,${s.lives}\nRegistros de projeto,${s.projectLogs}\n\n`;
  csv += "ENTRADAS POR CATEGORIA\ncategoria,valor\n" + s.incomeByCat.map(([c, v]) => `${c},${v}`).join("\n");
  csv += "\n\nSAIDAS POR CATEGORIA\ncategoria,valor\n" + s.expenseByCat.map(([c, v]) => `${c},${v}`).join("\n");
  csv += "\n\nLANCAMENTOS\ndata,tipo,categoria,valor,nota,recorrente\n";
  csv += s.entries.map((e) => `${e.date},${e.type},${e.category || ""},${e.amount ?? ""},"${(e.note || "").replace(/"/g, "'")}",${e.isRecurring ? FREQ_LABEL[e.frequency] : ""}`).join("\n");
  return csv;
}
function download(name, content) {
  const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function ReportTab({ state, monthKey, setMonthKey }) {
  const s = summarize(state, monthKey);
  const prevKey = shiftMonth(monthKey, -1);
  const prev = summarize(state, prevKey);
  const [y, m] = monthKey.split("-").map(Number);
  const targetPct = state.monthlyTarget > 0 ? (s.totalIn / state.monthlyTarget) * 100 : 0;
  const investedTotal = getInvestedTotal(state, toDateKey(new Date(y, m, 0)));

  const delta = (cur, old) => {
    if (old === 0) return null;
    return ((cur - old) / old) * 100;
  };
  const dIn = delta(s.totalIn, prev.totalIn);
  const dOut = delta(s.totalOut, prev.totalOut);

  const nowKey = toDateKey(new Date()).slice(0, 7);
  const isFuture = monthKey >= nowKey;

  const insights = [];
  if (s.totalIn > 0) {
    if (s.totalIn >= state.monthlyTarget) insights.push(`Meta batida: entradas de ${money(s.totalIn)} contra meta de ${money(state.monthlyTarget)}.`);
    else insights.push(`Faltaram ${money(state.monthlyTarget - s.totalIn)} para bater a meta de ${money(state.monthlyTarget)}.`);
  }
  if (s.expenseByCat.length > 0) {
    const [topCat, topVal] = s.expenseByCat[0];
    const share = s.totalOut > 0 ? Math.round((topVal / s.totalOut) * 100) : 0;
    insights.push(`Maior gasto: ${topCat}, ${money(topVal)} — ${share}% de tudo que saiu.`);
  }
  if (s.incomeByCat.length > 1) {
    const [topSrc, topVal] = s.incomeByCat[0];
    const share = Math.round((topVal / s.totalIn) * 100);
    if (share >= 70) insights.push(`${share}% da renda veio de "${topSrc}". Diversificar reduz risco.`);
  }
  if (s.lives > 0) insights.push(`${s.lives} live${s.lives > 1 ? "s" : ""} registrada${s.lives > 1 ? "s" : ""} no mês.`);

  return (
    <div>
      <div className="report-nav">
        <button className="report-nav-btn" onClick={() => setMonthKey(shiftMonth(monthKey, -1))}>
          <Icon name="chevronLeft" size={16} />
        </button>
        <span className="report-nav-title">{MONTHS[m - 1]} {y}</span>
        <button className="report-nav-btn" onClick={() => setMonthKey(shiftMonth(monthKey, 1))} disabled={isFuture}>
          <Icon name="chevronRight" size={16} />
        </button>
      </div>

      {s.txCount === 0 ? (
        <div className="report-empty">Nenhum lançamento em {MONTHS[m - 1]}.<br />Registra algo no Diário e o resumo aparece aqui.</div>
      ) : (
        <>
          <div className="hero-card">
            <span className="hero-label">Saldo líquido do mês</span>
            <div className={`hero-value ${s.net < 0 ? "neg" : ""}`}>{s.net < 0 ? "−" : ""}{money(Math.abs(s.net))}</div>
            <div className="hero-split">
              <div><span>Entradas</span><span style={{ color: "#7FD4BE" }}>{money(s.totalIn)}</span></div>
              <div><span>Saídas</span><span style={{ color: "#F09A85" }}>{money(s.totalOut)}</span></div>
              <div><span>Investido</span><span style={{ color: "#96BEE8" }}>{money(s.totalInv)}</span></div>
            </div>
          </div>

          <div className="kpi-grid">
            <div className="kpi">
              <span className="kpi-label">Meta do mês</span>
              <span className="kpi-value">{Math.round(targetPct)}%</span>
              <span className="kpi-sub">de {money(state.monthlyTarget)}</span>
            </div>
            <div className="kpi">
              <span className="kpi-label">Taxa de poupança</span>
              <span className="kpi-value">{Math.round(s.savingsRate)}%</span>
              <span className="kpi-sub">do que entrou</span>
            </div>
            <div className="kpi">
              <span className="kpi-label">Entradas</span>
              <span className="kpi-value">{money(s.totalIn)}</span>
              {dIn !== null
                ? <span className={`kpi-sub ${dIn >= 0 ? "up" : "down"}`}>{dIn >= 0 ? "▲" : "▼"} {Math.abs(Math.round(dIn))}% vs {MONTHS_SHORT[(m + 10) % 12]}</span>
                : <span className="kpi-sub">sem base anterior</span>}
            </div>
            <div className="kpi">
              <span className="kpi-label">Saídas</span>
              <span className="kpi-value">{money(s.totalOut)}</span>
              {dOut !== null
                ? <span className={`kpi-sub ${dOut <= 0 ? "up" : "down"}`}>{dOut >= 0 ? "▲" : "▼"} {Math.abs(Math.round(dOut))}% vs {MONTHS_SHORT[(m + 10) % 12]}</span>
                : <span className="kpi-sub">sem base anterior</span>}
            </div>
          </div>

          <div className="report-section">
            <div className="report-section-title"><span>Renda por fonte</span><span>{money(s.totalIn)}</span></div>
            <BarList data={s.incomeByCat} total={s.totalIn} color="#2F7A6B" />
          </div>

          <div className="report-section">
            <div className="report-section-title"><span>Gastos por categoria</span><span>{money(s.totalOut)}</span></div>
            <BarList data={s.expenseByCat} total={s.totalOut} color="#D9573F" />
          </div>

          <div className="report-section">
            <div className="report-section-title"><span>Atividade</span></div>
            <div className="activity-grid">
              <div className="activity-card">
                <span className="activity-icon" style={{ background: "#C4862F18", color: "#C4862F" }}><Icon name="radio" size={15} /></span>
                <div className="activity-text"><span className="activity-num">{s.lives}</span><span className="activity-label">lives</span></div>
              </div>
              <div className="activity-card">
                <span className="activity-icon" style={{ background: "#8A6BC418", color: "#8A6BC4" }}><Icon name="folder" size={15} /></span>
                <div className="activity-text"><span className="activity-num">{s.projectLogs}</span><span className="activity-label">registros de projeto</span></div>
              </div>
              <div className="activity-card">
                <span className="activity-icon" style={{ background: "#3A6EA518", color: "#3A6EA5" }}><Icon name="trendingUp" size={15} /></span>
                <div className="activity-text"><span className="activity-num">{money(investedTotal)}</span><span className="activity-label">investido acumulado</span></div>
              </div>
              <div className="activity-card">
                <span className="activity-icon" style={{ background: "#F0EEE8", color: "#55524C" }}><Icon name="check" size={15} /></span>
                <div className="activity-text"><span className="activity-num">{s.txCount}</span><span className="activity-label">lançamentos</span></div>
              </div>
            </div>
          </div>

          {insights.length > 0 && (
            <div className="report-section">
              <div className="report-section-title"><span>Leitura do mês</span></div>
              {insights.map((t, i) => <div className="insight" key={i}>{t}</div>)}
            </div>
          )}

          <button
            className="export-link solid"
            style={{ marginBottom: 30 }}
            onClick={() => download(`resumo-${monthKey}.csv`, reportToCSV(monthKey, s, state.monthlyTarget))}
          >
            <Icon name="download" size={13} /> Exportar relatório de {MONTHS[m - 1]}
          </button>
        </>
      )}
    </div>
  );
}

/* ================= DIARY ================= */
function CalendarStrip({ days, selected, onSelect, entriesByDate, liveDays, today }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      const a = ref.current.querySelector(".cal-day.selected");
      if (a) a.scrollIntoView({ inline: "center", block: "nearest" });
    }
  }, []);
  return (
    <div className="cal-strip" ref={ref}>
      {days.map((d) => {
        const key = toDateKey(d);
        const dayEntries = entriesByDate[key] || [];
        const types = [...new Set(dayEntries.map((e) => e.type))];
        return (
          <button key={key} className={`cal-day ${key === selected ? "selected" : ""} ${key === today ? "today" : ""}`} onClick={() => onSelect(key)}>
            <span className="cal-weekday">{WEEKDAYS[d.getDay()]}</span>
            <span className="cal-num">{d.getDate()}</span>
            <span className="cal-dots">
              {liveDays.includes(d.getDay()) && <span className="cal-dot live-marker" />}
              {types.slice(0, 3).map((t) => <span key={t} className="cal-dot" style={{ background: TYPE_META[t].color }} />)}
            </span>
          </button>
        );
      })}
    </div>
  );
}

function AddEntrySheet({ open, onClose, onAdd, onAddRecurring, projects, defaultType }) {
  const [type, setType] = useState(defaultType || "in");
  const [amount, setAmount] = useState("");
  const [category, setCategory] = useState("");
  const [note, setNote] = useState("");
  const [frequency, setFrequency] = useState("none");
  useEffect(() => { if (open) { setType(defaultType || "in"); setAmount(""); setCategory(""); setNote(""); setFrequency("none"); } }, [open, defaultType]);
  if (!open) return null;
  const needsAmount = FINANCIAL_TYPES.includes(type);
  const submit = () => {
    if (needsAmount && (!amount || isNaN(Number(amount)))) return;
    if (!needsAmount && !note.trim() && !category.trim()) return;
    if (needsAmount && frequency !== "none") onAddRecurring({ type, amount: Number(amount), category: category || TYPE_META[type].label, note, frequency });
    else onAdd({ type, amount: needsAmount ? Number(amount) : null, category: category || (type === "project" ? (projects[0] && projects[0].name) || "Projeto" : ""), note });
    onClose();
  };
  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="type-row">
          {Object.entries(TYPE_META).map(([key, meta]) => (
            <button key={key} className="type-chip" style={type === key ? { borderColor: meta.color, color: meta.color, background: `${meta.color}14` } : {}} onClick={() => setType(key)}>
              <Icon name={meta.icon} size={14} /> {meta.label}
            </button>
          ))}
        </div>
        {needsAmount ? (
          <>
            <input className="sheet-input big" placeholder="0" type="number" inputMode="decimal" autoFocus value={amount} onChange={(e) => setAmount(e.target.value)} />
            <input className="sheet-input" placeholder="categoria (campo, TCG, aluguel...)" value={category} onChange={(e) => setCategory(e.target.value)} />
          </>
        ) : type === "project" ? (
          <select className="sheet-input" value={category} onChange={(e) => setCategory(e.target.value)}>
            <option value="">selecione o projeto</option>
            {projects.map((p) => <option key={p.id} value={p.name}>{p.name}</option>)}
          </select>
        ) : null}
        <input className="sheet-input" placeholder="nota (opcional)" value={note} onChange={(e) => setNote(e.target.value)} />
        {needsAmount && (
          <div className="freq-row">
            <span className="freq-label"><Icon name="repeat" size={12} /> repete</span>
            {["none", "daily", "weekly", "monthly"].map((f) => (
              <button key={f} className={`freq-chip ${frequency === f ? "active" : ""}`} onClick={() => setFrequency(f)}>
                {f === "none" ? "Não" : FREQ_LABEL[f]}
              </button>
            ))}
          </div>
        )}
        <button className="sheet-submit" onClick={submit}><Icon name="check" size={15} color="#FAFAF7" /> Salvar</button>
      </div>
    </div>
  );
}

function EntryRow({ entry, onRemove }) {
  const meta = TYPE_META[entry.type];
  return (
    <div className="entry-row">
      <span className="entry-icon" style={{ background: `${meta.color}18`, color: meta.color }}><Icon name={meta.icon} size={14} /></span>
      <div className="entry-main">
        <span className="entry-cat">
          {entry.category || meta.label}
          {entry.isRecurring && <span className="recurring-badge"><Icon name="repeat" size={9} /> {FREQ_LABEL[entry.frequency]}</span>}
        </span>
        {entry.note && <span className="entry-note">{entry.note}</span>}
      </div>
      {entry.amount != null && <span className="entry-amount" style={{ color: meta.color }}>{entry.type === "out" ? "−" : "+"}{money(entry.amount)}</span>}
      <button className="entry-x" onClick={() => onRemove(entry)}><Icon name="x" size={13} /></button>
    </div>
  );
}

function SettingsPanel({ state, onChangeTarget, onChangeBlock, onToggleLiveDay, onCycleProject, onRemoveRecurring }) {
  const [open, setOpen] = useState(false);
  const cycle = { "Em build": "Rodando", "Rodando": "Pausado", "Pausado": "Em build" };
  return (
    <div className="settings">
      <button className="settings-toggle" onClick={() => setOpen(!open)}>
        <span>Configurações</span><Icon name={open ? "chevronUp" : "chevronDown"} size={15} />
      </button>
      {open && (
        <div className="settings-body">
          <div className="settings-block">
            <label>Meta mensal</label>
            <input type="number" value={state.monthlyTarget} onChange={(e) => onChangeTarget(Number(e.target.value) || 0)} />
          </div>
          {state.recurring.length > 0 && (
            <div className="settings-block">
              <label>Lançamentos recorrentes</label>
              {state.recurring.map((r) => {
                const meta = TYPE_META[r.type];
                return (
                  <div key={r.id} className="recurring-row">
                    <span className="recurring-dot" style={{ background: meta.color }} />
                    <span className="recurring-info">{r.category || meta.label} · {money(r.amount)} · {FREQ_LABEL[r.frequency]}</span>
                    <button className="entry-x" onClick={() => onRemoveRecurring(r.id)}><Icon name="x" size={13} /></button>
                  </div>
                );
              })}
            </div>
          )}
          <div className="settings-block">
            <label>Blocos do dia</label>
            {Object.entries(state.blocks).map(([id, b]) => (
              <div key={id} className="settings-time-row">
                <span className="settings-time-label">{id}</span>
                <input type="time" value={b.start} onChange={(e) => onChangeBlock(id, "start", e.target.value)} />
                <span>–</span>
                <input type="time" value={b.end} onChange={(e) => onChangeBlock(id, "end", e.target.value)} />
              </div>
            ))}
          </div>
          <div className="settings-block">
            <label>Dias de live</label>
            <div className="weekday-row">
              {WEEKDAYS.map((d, i) => (
                <button key={i} className={`weekday-btn ${state.liveDays.includes(i) ? "active" : ""}`} onClick={() => onToggleLiveDay(i)}>{d}</button>
              ))}
            </div>
          </div>
          <div className="settings-block">
            <label>Projetos</label>
            {state.projects.map((p) => (
              <button key={p.id} className="project-pill" onClick={() => onCycleProject(p.id, cycle)}>
                <span>{p.name}</span>
                <span className={`status-tag status-${p.status.replace(" ", "-")}`}>{p.status}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [state, save] = useStorage();
  const today = useMemo(() => toDateKey(new Date()), []);
  const [tab, setTab] = useState("diario");
  const [selected, setSelected] = useState(today);
  const [reportMonth, setReportMonth] = useState(today.slice(0, 7));
  const [sheetOpen, setSheetOpen] = useState(false);
  const [sheetType, setSheetType] = useState("in");

  const days = useMemo(() => {
    const arr = [];
    const base = new Date(); base.setHours(0, 0, 0, 0);
    for (let i = -13; i <= 6; i++) { const d = new Date(base); d.setDate(base.getDate() + i); arr.push(d); }
    return arr;
  }, []);

  const entriesByDate = useMemo(() => {
    const map = {};
    days.forEach((d) => { const k = toDateKey(d); map[k] = getEntriesForDate(state, k); });
    return map;
  }, [state, days]);

  const selectedEntries = (entriesByDate[selected] || []).slice().reverse();
  const selectedDateObj = new Date(selected + "T00:00:00");
  const monthKey = selected.slice(0, 7);
  const s = summarize(state, monthKey);
  const pct = Math.min(100, state.monthlyTarget > 0 ? (s.totalIn / state.monthlyTarget) * 100 : 0);
  const investedTotal = getInvestedTotal(state, today);

  const addEntry = (p) => save({ ...state, entries: [...state.entries, { id: Date.now().toString(), date: selected, ...p }] });
  const addRecurring = (p) => save({ ...state, recurring: [...state.recurring, { id: Date.now().toString(), startDate: selected, ...p }] });
  const removeEntryOrRule = (e) => {
    if (e.isRecurring) save({ ...state, recurring: state.recurring.filter((r) => r.id !== e.ruleId) });
    else save({ ...state, entries: state.entries.filter((x) => x.id !== e.id) });
  };
  const removeRecurring = (id) => save({ ...state, recurring: state.recurring.filter((r) => r.id !== id) });
  const changeTarget = (v) => save({ ...state, monthlyTarget: v });
  const changeBlock = (id, f, v) => save({ ...state, blocks: { ...state.blocks, [id]: { ...state.blocks[id], [f]: v } } });
  const toggleLiveDay = (i) => save({ ...state, liveDays: state.liveDays.includes(i) ? state.liveDays.filter((d) => d !== i) : [...state.liveDays, i].sort() });
  const cycleProject = (id, cyc) => save({ ...state, projects: state.projects.map((p) => (p.id === id ? { ...p, status: cyc[p.status] } : p)) });
  const openSheet = (t) => { setSheetType(t); setSheetOpen(true); };

  return (
    <div className="app">
      <div className="frame">
        <header className="topbar">
          <h1>Painel</h1>
          <span className="topbar-month">{MONTHS_SHORT[selectedDateObj.getMonth()]} {selectedDateObj.getFullYear()}</span>
        </header>

        <div className="tabs">
          <button className={`tab ${tab === "diario" ? "active" : ""}`} onClick={() => setTab("diario")}>Diário</button>
          <button className={`tab ${tab === "resumo" ? "active" : ""}`} onClick={() => { setReportMonth(monthKey); setTab("resumo"); }}>Resumo</button>
        </div>

        {tab === "diario" ? (
          <>
            <CalendarStrip days={days} selected={selected} onSelect={setSelected} entriesByDate={entriesByDate} liveDays={state.liveDays} today={today} />

            <div className="month-card">
              <div className="month-ring-wrap">
                <svg viewBox="0 0 64 64" className="ring">
                  <circle cx="32" cy="32" r="27" className="ring-bg" />
                  <circle cx="32" cy="32" r="27" className="ring-fg" style={{ strokeDasharray: `${pct * 1.696} 1000` }} />
                </svg>
                <span className="ring-pct">{Math.round(pct)}%</span>
              </div>
              <div className="month-numbers">
                <div><span className="dot-legend" style={{ background: "#2F7A6B" }} />Entradas <b>{money(s.totalIn)}</b></div>
                <div><span className="dot-legend" style={{ background: "#D9573F" }} />Saídas <b>{money(s.totalOut)}</b></div>
                <div className="month-target">meta {money(state.monthlyTarget)}</div>
              </div>
            </div>

            <div className="invest-card">
              <span className="invest-icon"><Icon name="trendingUp" size={17} /></span>
              <div className="invest-text">
                <span className="invest-label">Investido no total</span>
                <span className="invest-amount">{money(investedTotal)}</span>
              </div>
            </div>

            <div className="day-head">{selectedDateObj.toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long" })}</div>

            <div className="quick-add-row">
              {Object.entries(TYPE_META).map(([key, meta]) => (
                <button key={key} className="quick-add-btn" onClick={() => openSheet(key)}>
                  <span className="quick-add-icon" style={{ background: `${meta.color}18`, color: meta.color }}><Icon name={meta.icon} size={15} /></span>
                  {meta.label}
                </button>
              ))}
            </div>

            <div className="entry-list">
              {selectedEntries.map((e) => <EntryRow key={e.id} entry={e} onRemove={removeEntryOrRule} />)}
              {selectedEntries.length === 0 && <div className="empty-day">Nada registrado nesse dia ainda. Toca em um dos botões acima.</div>}
            </div>

            <SettingsPanel
              state={state} onChangeTarget={changeTarget} onChangeBlock={changeBlock}
              onToggleLiveDay={toggleLiveDay} onCycleProject={cycleProject} onRemoveRecurring={removeRecurring}
            />
          </>
        ) : (
          <ReportTab state={state} monthKey={reportMonth} setMonthKey={setReportMonth} />
        )}
      </div>

      {tab === "diario" && (
        <button className="fab" onClick={() => openSheet("in")}><Icon name="plus" size={22} color="#FAFAF7" /></button>
      )}

      <AddEntrySheet open={sheetOpen} onClose={() => setSheetOpen(false)} onAdd={addEntry} onAddRecurring={addRecurring} projects={state.projects} defaultType={sheetType} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
